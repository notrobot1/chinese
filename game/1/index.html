<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chinese Runner - Adaptive</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1e1e1e;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<div id="canvas-wrapper"></div>

<script src="./pixi.min.js"></script>
<script>
// Глобальные переменные приложения
let words = [];
let app;

// Загрузка данных
fetch("https://notrobot1.github.io/chinese/game/1/word.json")
    .then(r => r.json())
    .then(data => {
        words = data;
        initApp();
    })
    .catch((err) => {
        console.error("Ошибка загрузки слов:", err);
        document.body.innerHTML = "<p style='color:red; text-align:center;'>Ошибка загрузки данных</p>";
    });

function initApp() {
    app = new PIXI.Application({
        resizeTo: window,
        backgroundColor: 0x1e1e1e,
        antialias: true,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true
    });
    document.getElementById("canvas-wrapper").appendChild(app.view);
    startGame();
}

function startGame() {
    // --- Состояние игры ---
    let currentWordIndex = 0;
    let buttonContainer = null;
    let obstacleAnswered = false;
    let answerWasCorrect = false;
    let paused = false;
    let slowmo = false;
    let timeScale = 1;
    let hitFlash = 0;
    const flashSpeed = 0.05;
    let slowmoFactor = 0.3; // Базовое значение (30% скорости)

    // --- Адаптивные параметры (обновляются при ресайзе) ---
    const baseWidth = 800;
    let scale = 1;
    let cubeSize = 60;
    let gravity = 0.9;
    let jumpPower = -16;
    let obstacleSpeed = 12;
    let triggerDistance = 400;
    let failDistance = 100;

    function updateScale() {
        scale = Math.min(app.screen.width / baseWidth, 1);
        if (app.screen.width < 500) scale = app.screen.width / baseWidth * 1.5; // Чуть увеличим на совсем мелких экранах

        cubeSize = 60 * scale;
        gravity = 0.9 * scale;
        jumpPower = -16 * scale;
        obstacleSpeed = 12 * scale;
        triggerDistance = app.screen.width * 0.7; // Замедление на 60% ширины экрана
        failDistance = cubeSize * 2.5;

        let ratio = app.screen.width / baseWidth;
        slowmoFactor = 0.15 + (Math.min(ratio, 1) * 0.25);

        // Обновляем позиции элементов
        homeBtn.scale.set(scale > 0.7 ? 1 : 0.8);
        pauseBtn.scale.set(scale > 0.7 ? 1 : 0.8);
        pauseBtn.x = app.screen.width - 60 * scale;
        
        slowmoBtn.style.fontSize = 36 * scale;
        slowmoBtn.x = (app.screen.width - slowmoBtn.width) / 2;
        
        cube.x = app.screen.width * 0.15;
    }

    function getGroundY() {
        return app.screen.height / 2 + cubeSize / 2;
    }

    // --- Вспомогательные функции ---
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function loadWord(index) {
        const word = words[index];
        slowmoBtn.text = word.ru;
        slowmoBtn.visible = true;
        slowmoBtn.x = (app.screen.width - slowmoBtn.width) / 2;

        const similar = word.similar ? word.similar.split(" ").filter(s => s.trim() !== "") : [];
        let options = [word.hanzi, ...similar];
        return shuffle(options);
    }

    function createOptionButtons(optionsArray) {
        if (buttonContainer) app.stage.removeChild(buttonContainer);
        buttonContainer = new PIXI.Container();
        app.stage.addChild(buttonContainer);

        const padding = 15;
        const spacing = 10;
        const btnH = 60 * scale;
        const availableW = app.screen.width - (padding * 2);
        const btnW = (availableW - (optionsArray.length - 1) * spacing) / optionsArray.length;

        optionsArray.forEach((text, i) => {
            const btn = new PIXI.Container();
            const bg = new PIXI.Graphics();
            bg.beginFill(0x333333).drawRoundedRect(0, 0, btnW, btnH, 10).endFill();
            
            const txt = new PIXI.Text(text, {
                fontFamily: 'Arial',
                fontSize: Math.max(14, 26 * scale),
                fill: 0xffffff
            });
            txt.anchor.set(0.5);
            txt.x = btnW / 2;
            txt.y = btnH / 2;

            btn.addChild(bg, txt);
            btn.interactive = true;
            btn.buttonMode = true;

            btn.on('pointerdown', () => {
                if (obstacleAnswered) return;
                const correct = words[currentWordIndex].hanzi;
                
                buttonContainer.children.forEach(c => {
                    if (c.children[1].text !== correct) c.visible = false;
                    else c.children[0].tint = 0x00aa00;
                });

                slowmoBtn.visible = false;
                if (text === correct) {
                    answerWasCorrect = true;
                    bg.tint = 0x00aa00;
                } else {
                    answerWasCorrect = false;
                    bg.tint = 0xff0000;
                }
                
                setSlowmo(false);
                obstacleAnswered = true;
                currentWordIndex = (currentWordIndex + 1) % words.length;
                options = loadWord(currentWordIndex);
            });

            btn.x = padding + i * (btnW + spacing);
            btn.y = app.screen.height - btnH - 30;
            buttonContainer.addChild(btn);
        });
    }

    function setSlowmo(val) {
        slowmo = val;
        // Теперь используем динамический фактор вместо фиксированного 0.3
        timeScale = slowmo ? slowmoFactor : 1;
    }

    // --- Создание объектов ---
    const slowmoBtn = new PIXI.Text('', { fontFamily: 'Arial', fill: 0xffffff });
    slowmoBtn.y = 80;
    app.stage.addChild(slowmoBtn);

    const homeBtn = new PIXI.Text('🏠', { fontSize: 36, fill: 0xffffff });
    homeBtn.x = 20; homeBtn.y = 20;
    homeBtn.interactive = true; homeBtn.buttonMode = true;
    homeBtn.on('pointerdown', () => window.location.href = '/chinese');
    app.stage.addChild(homeBtn);

    const pauseBtn = new PIXI.Text('⏸️', { fontSize: 36, fill: 0xffffff });
    pauseBtn.y = 20;
    pauseBtn.interactive = true; pauseBtn.buttonMode = true;
    pauseBtn.on('pointerdown', () => {
        paused = !paused;
        pauseBtn.text = paused ? '▶️' : '⏸️';
        pauseText.visible = paused;
    });
    app.stage.addChild(pauseBtn);

    const pauseText = new PIXI.Text('PAUSED', { fontSize: 60, fill: 0xffffff });
    pauseText.anchor.set(0.5);
    pauseText.x = app.screen.width / 2; pauseText.y = app.screen.height / 2;
    pauseText.visible = false;
    app.stage.addChild(pauseText);

    const cube = new PIXI.Graphics();
    cube.lineStyle(4, 0x000000, 1).beginFill(0xffffff).drawRoundedRect(-30, -30, 60, 60, 12).endFill();
    cube.vy = 0;
    cube.onGround = true;
    app.stage.addChild(cube);

    const trail = new PIXI.Graphics();
    app.stage.addChildAt(trail, 0);
    let trailHistory = [];

    const obstacles = [];
    function createObstacle() {
        if (paused) return;
        const oSize = 50 * scale;
        const tri = new PIXI.Graphics();
        tri.beginFill(0xff4d4d).moveTo(0,0).lineTo(oSize,0).lineTo(oSize/2, -oSize).closePath().endFill();
        tri.x = app.screen.width + 100;
        tri.y = getGroundY() + cubeSize/2;
        tri.size = oSize;
        app.stage.addChild(tri);
        obstacles.push(tri);
    }

    function scheduleNextObstacle() {
        setTimeout(() => {
            if (!paused && obstacles.length === 0) createObstacle();
            scheduleNextObstacle();
        }, 1800);
    }

    // --- Инициализация ---
    updateScale();
    let options = loadWord(currentWordIndex);
    scheduleNextObstacle();

    window.addEventListener("resize", () => {
        app.renderer.resize(window.innerWidth, window.innerHeight);
        updateScale();
        if (buttonContainer) createOptionButtons(options);
    });

    // --- Игровой цикл ---
    app.ticker.add((delta) => {
        if (paused) return;
        const dt = delta * timeScale;

        cube.scale.set(scale);

        // Вспышка при ударе
        if (hitFlash > 0) {
            hitFlash -= flashSpeed * dt;
            const g = Math.floor(255 * (1 - Math.max(0, hitFlash)));
            cube.tint = (255 << 16) | (g << 8) | g;
        } else {
            cube.tint = 0xffffff;
        }

        // Физика куба
        cube.vy += gravity * dt;
        cube.y += cube.vy * dt;

        if (cube.y >= getGroundY()) {
            cube.y = getGroundY();
            cube.vy = 0;
            cube.onGround = true;
            cube.rotation = Math.round(cube.rotation / (Math.PI/2)) * (Math.PI/2);
        } else {
            cube.rotation += 0.15 * dt;
        }


        // =====================================
        // ВЕРНУЛИ СЛЕД (TRAIL) СЮДА
        // =====================================
        const maxTrail = 40;
        trailHistory.unshift({ x: cube.x, y: cube.y });
        if (trailHistory.length > maxTrail) trailHistory.pop();

        trail.clear();
        for (let i = 0; i < trailHistory.length; i++) {
            const p = trailHistory[i];
            if (i > 0) {
                p.x -= obstacleSpeed * dt; // Двигаем след назад со скоростью препятствий
                const prev = trailHistory[i - 1];
                const ratio = 1 - (i / trailHistory.length);
                
                // Ширина следа тоже зависит от scale (через cubeSize)
                const lineWidth = (cubeSize * 0.5) * ratio * (0.8 + Math.random() * 0.4);
                const alpha = 0.4 * ratio * (0.8 + Math.random() * 0.4);
                
                trail.lineStyle(lineWidth, 0xffffff, alpha);
                trail.moveTo(p.x, p.y);
                trail.lineTo(prev.x, prev.y);
            }
        }
        // =====================================

        // Препятствия и коллизии
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const o = obstacles[i];
            o.x -= obstacleSpeed * dt;

            if (o.x < -150) {
                app.stage.removeChild(o);
                obstacles.splice(i, 1);
                obstacleAnswered = false;
                continue;
            }

            const dx = cube.x - (o.x + o.size/2);
            const dy = cube.y - (o.y - o.size/2);
            const dist = Math.sqrt(dx*dx + dy*dy);

            // Дистанция для вопроса
            if (o.x > cube.x && dist <= triggerDistance && !slowmo && !obstacleAnswered) {
                setSlowmo(true);
                createOptionButtons(options);
            }

            // Прыжок если ответил верно
            if (o.x > cube.x && dist <= failDistance) {
                setSlowmo(false);
                if (answerWasCorrect) {
                    if (cube.onGround) cube.vy = jumpPower;
                    cube.onGround = false;
                }
                answerWasCorrect = false;
            }

            // Столкновение
            if (dist < cubeSize * 0.6) {
                hitFlash = 1;
            }
        }
    });
}
</script>
</body>
</html>
